<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="ML-Based RUL Prediction and Pricing for EV Battery Swapping Stations" />
    <meta name="author" content="EV RUL Team" />
    <title>EV Battery RUL & Pricing System</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">

    <!-- Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        body { font-family: 'Poppins', sans-serif; }
        .header-sticky { position: fixed; top: 0; width: 100%; z-index: 50; transition: all 0.3s; }
        .header-sticky.scrolled { background: rgba(0, 0, 0, 0.9); }
        .video-overlay { background: rgba(0, 0, 0, 0.5); }
        .btn-primary { background: #f43f5e; color: white; padding: 12px 24px; border-radius: 9999px; transition: background 0.3s; }
        .btn-primary:hover { background: #e11d48; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header-sticky bg-black bg-opacity-75">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="{{ url_for('index') }}" class="text-2xl font-bold text-white">
                EV <span class="text-red-500">Predictor</span>
            </a>
            <nav class="hidden md:flex space-x-6">
                <a href="{{ url_for('index') }}" class="text-white hover:text-red-500">Home</a>
                <a href="{{ url_for('about') }}" class="text-white hover:text-red-500">About</a>
                <a href="{{ url_for('register') }}" class="text-white hover:text-red-500">Register</a>
                <a href="{{ url_for('login') }}" class="text-white hover:text-red-500">Login</a>
            </nav>
            <button class="md:hidden text-white focus:outline-none" onclick="toggleMenu()">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                </svg>
            </button>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-black bg-opacity-90">
            <div class="flex flex-col items-center py-4">
                <a href="{{ url_for('index') }}" class="text-white py-2">Home</a>
                <a href="{{ url_for('about') }}" class="text-white py-2">About</a>
                <a href="{{ url_for('register') }}" class="text-white py-2">Register</a>
                <a href="{{ url_for('login') }}" class="text-white py-2">Login</a>
            </div>
        </div>
    </header>

    <!-- Main Banner -->
    <div class="relative" id="top">
        <video autoplay muted loop class="w-full h-screen object-cover">
            <source src="{{ url_for('static', filename='images/large.mp4') }}" type="video/mp4" />
            Your browser does not support HTML5 video.
        </video>
        <div class="video-overlay absolute inset-0 flex items-center justify-center">
            <div class="text-center text-white">
                <h6 class="text-lg uppercase tracking-widest">ML-Powered RUL & Pricing Strategy</h6>
                <h2 class="text-5xl md:text-6xl font-bold mt-2">
                    Predict <span class="text-red-500">Battery Life</span> for EV Swapping
                </h2>
                <a href="{{ url_for('register') }}" class="btn-primary mt-6 inline-block">Join Now</a>
            </div>                       
        </div>
    </div>

    <!-- Footer -->
    <footer class="py-8 bg-black bg-opacity-75 text-white text-center">
        <div class="container mx-auto px-4">
            <p>© 2026 EV Battery RUL System - Designed for Smart Swapping</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://kit.fontawesome.com/a076d05399.js"></script>
    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }

        $(window).scroll(function () {
            if ($(this).scrollTop() > 50) {
                $('.header-sticky').addClass('scrolled');
            } else {
                $('.header-sticky').removeClass('scrolled');
            }
        });
    </script>
</body>
</html>
